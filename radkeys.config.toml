[app]
  name = "RadKeys"
  radiologist = "Dr. Galvani"
  config_path = "/home/galvani/dev/radkeys/radkeys.config.toml"
  language = "en"
  version = "0.2.0"
  [app.device]
    vendor_id = 4057
    product_id = 99
    protocol = "radkeys-diy"
  [app.fixed_buttons]
    copy = 0
    level_up = 1
    go_home = 2
  [app.layout]
    columns = 4
    rows = 4
    preview = ""
  [app.theme]
    preset = "Gruvbox Light"
    background = "#1a1a1a"
    button = "#2a2a2a"
    fixed = "#3a3a3a"

[[screens]]
  id = "root"
  title = "Início"

  [[screens.buttons]]
    index = 3
    label = "RX Tórax"
    action = "navigate"
    target = "rx_torax"

  [[screens.buttons]]
    index = 4
    label = "RX Abdome"
    action = "navigate"
    target = "rx_abdome"

  [[screens.buttons]]
    index = 5
    label = "TC"
    action = "navigate"
    target = "tc_menu"

  [[screens.buttons]]
    index = 6
    label = "RM"
    action = "navigate"
    target = "mr_menu"

[[screens]]
  id = "rx_torax"
  title = "RX Tórax"

  [[screens.buttons]]
    index = 3
    label = "Normal"
    action = "text"
    content = "Radiografia de tórax em incidências PA e perfil, realizadas em aparelho digital.\nArcada costal intacta, campos pulmonares livres, seios costofrênicos agudos.\nNão há evidência de derrame pleural, pneumotórax ou consolidação.\n"

  [[screens.buttons]]
    index = 4
    label = "Derrame direito"
    action = "text"
    content = "Radiografia de tórax demonstrando opacidade basal direita com obliteração do seio costofrênico,\nsugestiva de derrame pleural. Acompanhamento/ultrassonografia de tórax recomendado.\n"

  [[screens.buttons]]
    index = 5
    label = "Derrame esquerdo"
    action = "text"
    content = "Radiografia de tórax demonstrando opacidade basal esquerda com obliteração do seio costofrênico,\nsugestiva de derrame pleural. Acompanhamento/ultrassonografia de tórax recomendado.\n"

  [[screens.buttons]]
    index = 6
    label = "Pneumotórax"
    action = "text"
    content = "Radiografia de tórax evidenciando pneumotórax à direita, com retração pulmonar.\nAvaliação clínica conjunta recomendada.\n"

[[screens]]
  id = "rx_abdome"
  title = "RX Abdome"

  [[screens.buttons]]
    index = 3
    label = "Normal"
    action = "text"
    content = "Radiografia simples de abdome em decúbito e em pé.\nDistribuição normal de conteúdo aéreo. Não se observam níveis hidroaéreos\nnem calcificações patológicas. Posição e morfologia das alças preservadas.\n"

[[screens]]
  id = "tc_menu"
  title = "TC"
  buttons = []

[[screens]]
  id = "mr_menu"
  title = "RM"
  buttons = []
