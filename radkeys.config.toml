  Radiografia simples de abdome em decúbito e em pé.
  Distribuição normal de conteúdo aéreo. Não se observam
  níveis hidroaéreos nem calcificações patológicas.
  """

  [[layers.buttons]]
  row = 5
  col = 0
  label = "Voltar"
  action = "prev"
  [[layers.buttons]]
  row = 5
  col = 1
  label = "Início"
  action = "home"
  [[layers.buttons]]
  row = 5
  col = 3
  label = "Copiar"
  action = "copy"
  [[layers.buttons]]
  row = 5
  col = 4
  label = "Colar"
  action = "paste"
  [[layers.buttons]]
  row = 5
  col = 5
  label = "Próx"
    action = "next"

