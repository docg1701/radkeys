[app]
name = "RadKeys"
radiologist = "Dr. Galvani"
language = "en"
version = "0.2.1"

[app.device]
vendor_id = 0x1234
product_id = 0xABCD
protocol = "radkeys-diy"

[app.layout]
columns = 4
rows = 4

[app.theme]
preset = "light_gray"

# ── Layers ──

[[layers]]
name = "RX Tórax"

[[layers.buttons]]
row = 0
col = 3
label = "Normal"
action = "text"
content = "Radiografia de tórax em incidências PA e perfil, realizadas em aparelho digital.\nArcada costal intacta, campos pulmonares livres, seios costofrênicos agudos.\nNão há evidência de derrame pleural, pneumotórax ou consolidação.\n"

[[layers.buttons]]
row = 0
col = 4
label = "Derrame D"
action = "text"
content = "Radiografia de tórax demonstrando opacidade basal direita com obliteração\ndo seio costofrênico, sugestiva de derrame pleural.\nAcompanhamento/ultrassonografia de tórax recomendado.\n"

[[layers.buttons]]
row = 0
col = 5
label = "Derrame E"
action = "text"
content = "Radiografia de tórax demonstrando opacidade basal esquerda com obliteração\ndo seio costofrênico, sugestiva de derrame pleural.\nAcompanhamento/ultrassonografia de tórax recomendado.\n"

[[layers.buttons]]
row = 0
col = 6
label = "Pneumotórax"
action = "text"
content = "Radiografia de tórax evidenciando pneumotórax à direita, com retração pulmonar.\nAvaliação clínica conjunta recomendada.\n"

