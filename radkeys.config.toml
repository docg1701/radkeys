# =============================================================================
# RadKeys — Configuration File (TOML)
# =============================================================================
#
# NOTE: when `radkeys-config` or RadKeys saves this file, it first copies the
# current version to `radkeys.config.toml.bak`, then rewrites this file. The
# Go TOML encoder does not preserve comments, so the commented original is kept
# in the `.bak` backup. Restore from that file if you need your comments back.
#
# This file defines everything: radiologist name, language, theme, USB device,
# and the screen hierarchy with shortcut buttons.
#
# Structure:
#   - Each [[screens]] is a page with an id (unique) and a name.
#   - Each [[screens.buttons]] is a button at position (row, col) on the grid.
#   - Screens are connected via navigate actions with target screen ids.
#   - The first screen is the home screen.
#
# Actions:
#   text        — loads the content into the preview (requires content)
#   copy        — copies the preview text to clipboard
#   paste       — sends Ctrl/Cmd+V to the focused window (the RIS) via the device
#                 keyboard, pasting the clipboard there (RadKeys never steals focus)
#   prev        — goes back to the previous screen (stack-based)
#   home        — goes to the first screen (root)
#   navigate    — goes to a specific screen (requires target = screen id)
#   select_all  — sends Ctrl/Cmd+A (select all) via the device keyboard
#   select_line — selects the current line (Home then Shift+End) via the device keyboard
#   line_start  — sends Home (jump to start of line) via the device keyboard
#   line_end    — sends End (jump to end of line) via the device keyboard
#   backspace   — sends Backspace (delete backward) via the device keyboard
#   delete      — sends Delete Forward via the device keyboard
#
# Edit this file with any text editor and restart RadKeys.
# =============================================================================

[app]
name = "RadKeys"
radiologist = "Dr. Galvani"
language = "en"

[app.device]
vendor_id = 0x1234
product_id = 0xABCD
protocol = "radkeys-diy"

[app.layout]
columns = 6
rows = 6

[app.theme]
preset = "dracula"

# =============================================================================
# SCREENS
# =============================================================================

# ── Root: modality selection ───────────────────────────────────────────────
[[screens]]
id = "root"
name = "Modalities"

  [[screens.buttons]]
  row = 0
  col = 0
  label = "X-Ray"
  action = "navigate"
  target = "xray_menu"

  [[screens.buttons]]
  row = 0
  col = 1
  label = "CT"
  action = "navigate"
  target = "ct_menu"

  [[screens.buttons]]
  row = 0
  col = 2
  label = "MRI"
  action = "navigate"
  target = "mri_menu"

# ── X-Ray submenu ──────────────────────────────────────────────────────────
[[screens]]
id = "xray_menu"
name = "X-Ray"

  [[screens.buttons]]
  row = 0
  col = 0
  label = "Chest"
  action = "navigate"
  target = "xray_chest"

  [[screens.buttons]]
  row = 0
  col = 1
  label = "Abdomen"
  action = "navigate"
  target = "xray_abdomen"

  [[screens.buttons]]
  row = 0
  col = 2
  label = "Bone Age"
  action = "navigate"
  target = "xray_bone_age"

  [[screens.buttons]]
  row = 0
  col = 3
  label = "Scoliosis"
  action = "navigate"
  target = "xray_scoliosis"

  [[screens.buttons]]
  row = 5
  col = 0
  label = "Back"
  action = "prev"

  [[screens.buttons]]
  row = 5
  col = 1
  label = "Home"
  action = "home"

  [[screens.buttons]]
  row = 5
  col = 3
  label = "Copy"
  action = "copy"

  [[screens.buttons]]
  row = 5
  col = 4
  label = "Paste"
  action = "paste"

# ── X-Ray Chest: report texts ──────────────────────────────────────────────
[[screens]]
id = "xray_chest"
name = "Chest X-Ray"

  [[screens.buttons]]
  row = 0
  col = 0
  label = "Normal"
  action = "text"
  content = """
  PA and lateral chest radiographs.
  Intact thoracic cage, clear lung fields, sharp costophrenic angles.
  No evidence of pleural effusion, pneumothorax, or consolidation.
  """

  [[screens.buttons]]
  row = 0
  col = 1
  label = "Effusion R"
  action = "text"
  content = """
  Right basal opacity with blunting of the costophrenic angle,
  suggestive of pleural effusion. Ultrasound correlation recommended.
  """

  [[screens.buttons]]
  row = 0
  col = 2
  label = "Effusion L"
  action = "text"
  content = """
  Left basal opacity with blunting of the costophrenic angle,
  suggestive of pleural effusion. Ultrasound correlation recommended.
  """

  [[screens.buttons]]
  row = 0
  col = 3
  label = "Pneumothorax"
  action = "text"
  content = """
  Right-sided pneumothorax with pulmonary retraction.
  Clinical correlation recommended.
  """

  [[screens.buttons]]
  row = 5
  col = 0
  label = "Back"
  action = "prev"
  [[screens.buttons]]
  row = 5
  col = 1
  label = "Home"
  action = "home"
  [[screens.buttons]]
  row = 5
  col = 2
  label = "Select All"
  action = "select_all"
  [[screens.buttons]]
  row = 5
  col = 3
  label = "Copy"
  action = "copy"
  [[screens.buttons]]
  row = 5
  col = 4
  label = "Paste"
  action = "paste"
  [[screens.buttons]]
  row = 5
  col = 5
  label = "Backspace"
  action = "backspace"

