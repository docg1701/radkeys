name: build

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-dev xorg-dev libudev-dev

      - name: macOS deps
        if: runner.os == 'macOS'
        run: |
          # hidapi needs nothing extra (IOKit/CoreFoundation are system frameworks)

      - name: Windows deps
        if: runner.os == 'Windows'
        run: |
          # hidapi and Fyne need GCC (MinGW). setup-go provides it via CGO.
          # No extra packages needed.

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...