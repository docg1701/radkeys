[[screens]]
  id = "xray_hand_metacarp"
  name = "Metacarpal Fracture"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Boxer Fx"
    action = "text"
    content = "PA, oblique, and lateral views of the right hand.\n\nImpacted transverse fracture through fifth metacarpal neck with ~35\ndegrees volar angulation. No intra-articular extension or rotational\ndeformity. Remaining metacarpals and phalanges unremarkable.\n\nIMPRESSION: Fifth MC neck fracture (boxer fracture) with moderate\nvolar angulation. Closed reduction if > 40 degrees."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Bennett"
    action = "text"
    content = "PA and lateral views of the right thumb.\n\nOblique intra-articular fracture through first MC base with ~2 mm\ndisplacement and radial/dorsal subluxation of MC shaft. Volar-ulnar\nfragment attached to anterior oblique ligament.\n\nIMPRESSION: Bennett fracture with CMC subluxation. Unstable injury.\nUrgent orthopedic referral for CRPP or ORIF."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Rolando"
    action = "text"
    content = "PA and lateral views of the left thumb.\n\nComminuted, Y-shaped intra-articular fracture through first MC base\nwith multiple displaced fragments involving both articular surfaces.\nSignificant joint incongruity.\n\nIMPRESSION: Rolando fracture (comminuted first MC base). Urgent hand\nsurgery referral for ORIF or external fixation."

