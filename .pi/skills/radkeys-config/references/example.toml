[[screens]]
  id = "us_abdomen_liver"
  name = "Liver US"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "Ultrasound of the liver.\n\nLiver normal in size (span 14.5 cm) with smooth contour and homogeneous\nechotexture. No focal lesions. Hepatic vasculature patent with normal\nflow. Biliary tree nondilated. CBD 3 mm.\n\nIMPRESSION: Normal liver ultrasound."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Steatosis"
    action = "text"
    content = "Ultrasound of the liver.\n\nLiver enlarged (span 17.2 cm) with diffusely increased echogenicity\ncompared to right renal cortex. Posterior beam attenuation with\ndecreased visualization of hepatic vessels and diaphragm. No focal\nlesions. Patent vasculature.\n\nIMPRESSION: Moderate to severe hepatic steatosis. Correlate for\nmetabolic syndrome, NAFLD, and alcohol use."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Cirrhosis"
    action = "text"
    content = "Ultrasound of the liver.\n\nLiver with nodular contour and coarse, heterogeneous echotexture\nconsistent with cirrhosis. Right lobe atrophy with relative caudate\nhypertrophy. Mild splenomegaly (13.5 cm). No focal lesions. Patent\nportal vein with hepatopetal flow. No ascites.\n\nIMPRESSION: Cirrhosis with portal hypertension (splenomegaly).\nHepatology follow-up for HCC screening."

