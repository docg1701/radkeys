[[screens]]
  id = "xray_chest"
  name = "Chest X-Ray"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "PA and lateral chest radiographs were obtained.\n\nLungs are clear without focal consolidation, pneumothorax, or pleural\neffusion. Cardiomediastinal silhouette is normal. No pulmonary edema.\nCostophrenic angles are sharp. Trachea is midline. Osseous structures\nand soft tissues are unremarkable.\n\nIMPRESSION: Normal chest radiograph."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Effusion R"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nBlunting of the right costophrenic angle with a meniscoid opacity\ntracking up the lateral chest wall, consistent with right pleural\neffusion. Left lung is clear. Cardiomediastinal silhouette is normal.\n\nIMPRESSION: Right pleural effusion. US correlation recommended."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Effusion L"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nBlunting of the left costophrenic angle with a meniscoid opacity\ntracking up the lateral chest wall, consistent with left pleural\neffusion. Right lung is clear. Cardiomediastinal silhouette is normal.\n\nIMPRESSION: Left pleural effusion. US correlation recommended."

  [[screens.buttons]]
    row = 0
    col = 3
    label = "Pneumothorax"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nVisible visceral pleural line in the right hemithorax with absence of\nlung markings peripheral to this line, consistent with right-sided\npneumothorax (estimated 30%). No mediastinal shift. Left lung is clear.\n\nIMPRESSION: Right pneumothorax. Clinical correlation recommended."

  [[screens.buttons]]
    row = 0
    col = 4
    label = "Pneumonia"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nFocal airspace opacity in the right lower lobe with air bronchograms,\nconsistent with consolidation. No pleural effusion. Left lung is clear.\nCardiomediastinal silhouette is normal.\n\nIMPRESSION: RLL consolidation, suggestive of pneumonia."

  [[screens.buttons]]
    row = 0
    col = 5
    label = "CHF/Edema"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nCardiomegaly (CTR > 0.5). Bilateral perihilar and interstitial opacities\nwith Kerley B lines, consistent with pulmonary edema. Small bilateral\npleural effusions. Cephalization of pulmonary vasculature.\n\nIMPRESSION: CHF with pulmonary edema. Correlate with BNP."

  [[screens.buttons]]
    row = 1
    col = 0
    label = "Atelectasis"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nLinear bandlike opacity in the left lung base with volume loss\n(ipsilateral diaphragmatic elevation and mediastinal shift),\nconsistent with platelike atelectasis. No consolidation or effusion.\n\nIMPRESSION: Left basilar platelike atelectasis."

  [[screens.buttons]]
    row = 1
    col = 1
    label = "Nodule"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nSolitary well-circumscribed nodular opacity measuring ~8 mm in the\nright upper lobe. No calcification. No other nodules. Remainder of\nlungs is clear.\n\nIMPRESSION: Solitary pulmonary nodule, 8 mm, RUL. Comparison with\nprior studies and CT recommended per Fleischner guidelines."

  [[screens.buttons]]
    row = 1
    col = 2
    label = "Fibrosis"
    action = "text"
    content = "PA and lateral chest radiographs.\n\nBilateral reticular opacities with basal and subpleural predominance,\nconsistent with UIP pattern. Volume loss with diaphragmatic tenting.\nNo effusion or pneumothorax.\n\nIMPRESSION: Bilateral pulmonary fibrosis with UIP pattern. HRCT\nrecommended. Correlate for CTD or hypersensitivity pneumonitis."

  [[screens.buttons]]
    row = 4
    col = 0
    label = "SLine"
    action = "select_line"

