[[screens]]
  id = "mri_brain"
  name = "Brain MRI"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "MRI of the brain without contrast.\n\nTECHNIQUE: Multiplanar multisequence MRI without IV contrast (T1, T2,\nFLAIR, DWI/ADC, SWI).\n\nFINDINGS: Normal brain parenchyma. No acute infarct (DWI/ADC negative).\nNormal gray-white differentiation. Ventricles and sulci age-appropriate.\nNo mass, mass effect, or midline shift. Normal flow voids in major\nintracranial vessels. Sella, brainstem, posterior fossa unremarkable.\n\nIMPRESSION: Normal MRI of the brain without contrast."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "CVA Acute"
    action = "text"
    content = "MRI of the brain without contrast.\n\nTECHNIQUE: Multiplanar multisequence MRI without IV contrast.\n\nFINDINGS: Area of restricted diffusion (DWI+, ADC-) in left MCA\nterritory involving insular cortex and frontal operculum. Correlating\nT2/FLAIR hyperintensity. No hemorrhagic transformation on SWI. No\nsignificant mass effect or midline shift.\n\nIMPRESSION: Acute infarct, left MCA territory (insular ribbon and\nfrontal operculum). Neurology consultation and stroke workup."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "MS Plaques"
    action = "text"
    content = "MRI of the brain without and with IV contrast.\n\nMultiple periventricular and juxtacortical ovoid T2/FLAIR hyperintense\nlesions perpendicular to corpus callosum (\"Dawson's fingers\"). Several\nT1 hypointense (\"black holes\"). One left frontal lesion with incomplete\nrim enhancement. Corpus callosum involvement. No restricted diffusion.\n\nIMPRESSION: Multiple supratentorial white matter lesions characteristic\nof MS. Active enhancing lesion. Neurology follow-up recommended."

