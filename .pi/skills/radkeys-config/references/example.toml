    label = "Solid <8mm"
    action = "text"
    content = "Non-contrast chest CT for nodule follow-up.\n\nSolid pulmonary nodule measuring 6 x 5 mm in RUL (series 2, image 45).\nNo calcification or fat. Stable compared to prior study of <date>. No\nnew nodules.\n\nIMPRESSION: Stable 6 mm solid nodule, RUL. Follow-up in 12 months per\nFleischner guidelines."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Solid >8mm"
    action = "text"
    content = "Non-contrast chest CT for nodule evaluation.\n\nSolid pulmonary nodule measuring 11 x 9 mm with lobulated margins in\nLLL (series 2, image 67). No calcification. Mild surrounding GGO. No\nother nodules. Mediastinal and hilar nodes normal.\n\nIMPRESSION: 11 mm solid nodule, LLL, indeterminate. PET/CT or tissue\nsampling per Fleischner. Short-term follow-up (3 months) alternative\nfor low-risk patients."

