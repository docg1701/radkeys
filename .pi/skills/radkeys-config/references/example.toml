[[screens]]
  id = "ct_head"
  name = "Head CT"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "Non-contrast CT of the head.\n\nNo acute intracranial hemorrhage, mass effect, or midline shift.\nVentricles and sulci age-appropriate. Gray-white differentiation\npreserved. Posterior fossa unremarkable. No calvarial fracture.\n\nIMPRESSION: Normal non-contrast head CT."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "SAH"
    action = "text"
    content = "Non-contrast CT of the head.\n\nAcute hyperdensity in basal cisterns and Sylvian fissures bilaterally,\nconsistent with acute SAH (Fisher grade 3). Mild ventricular dilatation\nconcerning for early hydrocephalus. No parenchymal hematoma.\n\nIMPRESSION: Acute SAH (Fisher 3) with early hydrocephalus. Emergent\nneurosurgical consultation. CTA for aneurysm evaluation."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "SDH Acute"
    action = "text"
    content = "Non-contrast CT of the head.\n\nCrescent-shaped hyperdense extra-axial collection up to 12 mm over\nright cerebral convexity — acute SDH. Associated mass effect with\n~8 mm right-to-left midline shift, partial effacement of right\nlateral ventricle, and uncal herniation.\n\nIMPRESSION: Large acute right SDH with mass effect and uncal\nherniation. Emergent neurosurgical intervention indicated."

