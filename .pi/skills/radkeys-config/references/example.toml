[[screens]]
  id = "xray_scoliosis"
  name = "Scoliosis Series"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "Full spine PA and lateral radiographs for scoliosis evaluation.\n\nNormal spinal alignment without significant coronal or sagittal\ndeformity. No vertebral anomalies, fractures, or destructive lesions.\nRisser sign appropriate for age.\n\nIMPRESSION: No significant scoliosis. Normal spinal alignment."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Idiopathic"
    action = "text"
    content = "Full spine PA and lateral radiographs for scoliosis evaluation.\n\nRight thoracic curve with apex at T8-T9 measuring ~18 degrees (Cobb\nangle), consistent with adolescent idiopathic scoliosis. No vertebral\nrotation or structural anomalies. Risser sign grade 3.\n\nIMPRESSION: Adolescent idiopathic scoliosis, 18-degree right thoracic\ncurve. Orthopedic follow-up recommended."

