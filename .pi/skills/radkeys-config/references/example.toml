[[screens]]
  id = "xray_knee"
  name = "Knee X-Ray"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "AP, lateral, and sunrise views of the left knee.\n\nNormal alignment and mineralization. No fracture or dislocation.\nJoint spaces preserved (medial, lateral, patellofemoral). No\neffusion. No loose bodies. Soft tissues unremarkable.\n\nIMPRESSION: Normal left knee radiographs."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "OA Medial"
    action = "text"
    content = "AP and lateral views of the right knee, weight-bearing.\n\nModerate medial compartment joint space narrowing with subchondral\nsclerosis and marginal osteophytes. Lateral compartment and PFJ\nrelatively preserved. No fracture or effusion.\n\nIMPRESSION: Moderate medial compartment osteoarthritis. KL grade 3."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "OA Tricomp"
    action = "text"
    content = "AP, lateral, and sunrise views of the right knee.\n\nSevere tricompartmental joint space narrowing with pronounced\nsubchondral sclerosis, subchondral cysts, and large osteophytes.\nVarus malalignment.\n\nIMPRESSION: Severe tricompartmental OA. KL grade 4 with varus\ndeformity. Orthopedic evaluation for arthroplasty."

