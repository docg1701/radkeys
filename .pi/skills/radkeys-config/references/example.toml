[[screens]]
  id = "xray_hand_degen"
  name = "Degenerative Hand"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "CMC OA"
    action = "text"
    content = "PA view of both hands.\n\nModerate first CMC joint space narrowing and subchondral sclerosis\nbilaterally, right > left. Small osteophytes.\n\nIMPRESSION: Bilateral first CMC OA, moderate on right."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Erosive OA"
    action = "text"
    content = "PA view of both hands.\n\nDIP and PIP joint space narrowing with central subchondral erosions\n(\"gull-wing\" deformity) and marginal osteophytes. No periarticular\nosteopenia or marginal erosions to suggest RA.\n\nIMPRESSION: Erosive OA (\"gull-wing\" pattern). Rheumatology correlation."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "CPPD"
    action = "text"
    content = "PA view of the right hand.\n\nChondrocalcinosis of the TFCC and radiocarpal joint, consistent with\nCPPD crystal deposition disease. Mild radiocarpal narrowing.\n\nIMPRESSION: Chondrocalcinosis of the wrist (CPPD arthropathy).\nCorrelate for pseudogout."

