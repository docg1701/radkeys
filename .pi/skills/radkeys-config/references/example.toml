[[screens]]
  id = "us_thyroid"
  name = "Thyroid US"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "Ultrasound of the thyroid gland.\n\nThyroid normal in size (RL 4.5 x 1.8 x 1.6 cm, LL 4.2 x 1.7 x 1.5 cm).\nParenchyma homogeneous without nodules or cysts. Isthmus unremarkable.\nNo cervical lymphadenopathy.\n\nIMPRESSION: Normal thyroid ultrasound."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "TI-RADS 3"
    action = "text"
    content = "Ultrasound of the thyroid gland.\n\nSolid, isoechoic nodule 1.5 x 1.2 x 0.9 cm in right lobe. Smooth\nmargins, well-defined, no calcifications. Wider-than-tall.\nTI-RADS 3 (mildly suspicious). Left lobe and isthmus unremarkable.\n\nIMPRESSION: TI-RADS 3 nodule, right lobe. Follow-up US in 12 months."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "TI-RADS 5"
    action = "text"
    content = "Ultrasound of the thyroid gland.\n\nSolid, markedly hypoechoic nodule 2.1 x 1.6 x 1.3 cm in right lobe\nwith irregular margins, microcalcifications, and taller-than-wide\nmorphology. TI-RADS 5 (highly suspicious, 9 points).\n\nIMPRESSION: TI-RADS 5 nodule, right lobe. FNA biopsy per ACR guidelines."

