  name = "CT Abd/Pelvis"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "CT of abdomen and pelvis with IV contrast.\n\nLiver, gallbladder, spleen, pancreas, adrenals, and kidneys normal in\nsize, contour, and enhancement. No focal lesions. Normal bowel caliber.\nNo free fluid or free air. No lymphadenopathy. Bladder and pelvic\norgans unremarkable.\n\nIMPRESSION: Normal contrast-enhanced CT abdomen and pelvis."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Appendicitis"
    action = "text"
    content = "CT of abdomen and pelvis with IV contrast.\n\nAppendix dilated (12 mm) with wall enhancement, periappendiceal fat\nstranding, and small appendicolith at tip. Minimal adjacent free fluid.\nNo abscess or perforation. Remainder unremarkable.\n\nIMPRESSION: Acute appendicitis with appendicolith. No perforation.\nSurgical consultation recommended."

