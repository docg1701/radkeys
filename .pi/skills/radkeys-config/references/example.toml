[[screens]]
  id = "mri_spine_lumbar_stenosis"
  name = "Lumbar Stenosis"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Central"
    action = "text"
    content = "MRI of the lumbar spine without contrast.\n\nSevere central spinal canal stenosis at L3-L4 and L4-L5 secondary to\nbroad-based disc bulges, ligamentum flavum hypertrophy, and facet OA.\nThecal sac AP diameter 6 mm at L4-L5. Crowding of cauda equina.\nMultilevel moderate foraminal narrowing.\n\nIMPRESSION: Severe multilevel central canal stenosis (L3-L5) with\ncauda equina crowding. Neurosurgical decompressive laminectomy."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Foraminal"
    action = "text"
    content = "MRI of the lumbar spine without contrast.\n\nModerate to severe bilateral neural foraminal narrowing at L4-L5 and\nL5-S1 due to disc height loss, uncovertebral/facet hypertrophy, and\nposterolateral disc bulges. Exiting L4, L5, and S1 nerve roots contacted\nbilaterally. No significant central stenosis.\n\nIMPRESSION: Multilevel foraminal stenosis with bilateral nerve root\ncontact. Pain management for selective nerve root blocks."

  [[screens.buttons]]
    row = 4
    col = 0
    label = "SLine"
    action = "select_line"

