[[screens]]
  id = "us_abdomen_gb"
  name = "Gallbladder US"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "RUQ ultrasound (gallbladder).\n\nGallbladder distended with thin walls (2 mm). No stones, sludge, or\npolyps. No pericholecystic fluid. Sonographic Murphy sign negative.\nCBD 3 mm. No intrahepatic biliary dilation.\n\nIMPRESSION: Normal gallbladder ultrasound."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Cholecystitis"
    action = "text"
    content = "RUQ ultrasound.\n\nGallbladder distended with wall thickening (6 mm) and pericholecystic\nfluid. Multiple shadowing gallstones including one impacted at neck.\nSonographic Murphy sign positive. CBD 5 mm. No intrahepatic dilation.\n\nIMPRESSION: Acute calculous cholecystitis with impacted neck stone.\nSurgical consultation for cholecystectomy."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Polyp"
    action = "text"
    content = "RUQ ultrasound.\n\nNon-shadowing, non-mobile polypoid lesion measuring 7 mm in gallbladder\nfundus. No vascularity on color Doppler. No other lesions. Wall thin.\nNo stones or sludge. Murphy sign negative.\n\nIMPRESSION: 7 mm gallbladder polyp, likely benign. Follow-up US in\n6 and 12 months. Surgical consultation if > 10 mm."

