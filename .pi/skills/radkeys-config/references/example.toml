  name = "Bone Age"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal (GP)"
    action = "text"
    content = "Left hand and wrist radiograph for bone age assessment.\n\nBone age is consistent with chronological age per Greulich and Pyle\nstandards. All carpals, metacarpals, and phalanges show age-appropriate\nossification.\n\nIMPRESSION: Normal bone age per Greulich and Pyle atlas."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Delayed"
    action = "text"
    content = "Left hand and wrist radiograph for bone age assessment.\n\nBone age delayed by ~2 SD compared to chronological age per Greulich\nand Pyle standards. Carpal ossification lags chronologic age.\n\nIMPRESSION: Delayed bone age. Endocrinological correlation recommended."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Advanced"
    action = "text"
    content = "Left hand and wrist radiograph for bone age assessment.\n\nBone age advanced by ~2 SD compared to chronological age per Greulich\nand Pyle standards.\n\nIMPRESSION: Advanced bone age. Endocrinological correlation recommended."

