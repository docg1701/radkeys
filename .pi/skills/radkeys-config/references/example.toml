[[screens]]
  id = "xray_hand_scaphoid"
  name = "Scaphoid Fracture"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Waist Fx"
    action = "text"
    content = "PA, oblique, and scaphoid views of the right wrist.\n\nTransverse lucent line through scaphoid waist with ~1 mm cortical\noffset. No sclerosis or cystic change. Scapholunate interval normal.\n\nIMPRESSION: Acute scaphoid waist fracture, minimally displaced.\nThumb spica cast for 6-12 weeks. Follow-up at 6 and 12 weeks."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Prox Pole"
    action = "text"
    content = "PA, oblique, and scaphoid views of the left wrist.\n\nSubtle lucency at proximal pole of scaphoid with 1 mm sclerosis of\nproximal fragment. No significant displacement. Scapholunate interval\npreserved.\n\nIMPRESSION: Proximal pole scaphoid fracture. Due to tenuous blood\nsupply, orthopedic evaluation for surgical fixation recommended."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Nonunion"
    action = "text"
    content = "PA, oblique, and scaphoid views of the right wrist.\n\nWell-defined lucent defect through scaphoid waist with smooth,\nsclerotic margins and 2 mm diastasis — established nonunion. Cystic\nchange in proximal fragment suggesting AVN. DISI deformity present.\n\nIMPRESSION: Scaphoid waist nonunion with AVN and DISI. Urgent hand\nsurgery referral for bone grafting and internal fixation."

