[[screens]]
  id = "ct_chest_pe"
  name = "Pulmonary Embolism"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Acute PE"
    action = "text"
    content = "CTPA.\n\nBilateral filling defects within main pulmonary arteries extending\ninto lobar and segmental branches — acute PE. Right ventricular\ndilation with straightening of IVS (RV/LV > 1.0) suggesting right\nheart strain. Small wedge-shaped peripheral opacity RLL consistent\nwith pulmonary infarction. No effusion.\n\nIMPRESSION: Acute bilateral PE with right heart strain. Immediate\nanticoagulation and risk stratification."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Chronic PE"
    action = "text"
    content = "CTPA.\n\nEccentric, peripherally located filling defects within segmental\nbranches of both lower lobe PAs forming obtuse angles with vessel\nwall — chronic PE. Mosaic perfusion, enlarged bronchial arteries,\nmild PA dilation (32 mm).\n\nIMPRESSION: Chronic PE with CT features of pulmonary hypertension.\nV/Q scintigraphy and echocardiography recommended."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Saddle PE"
    action = "text"
    content = "CTPA.\n\nLarge saddle embolus straddling bifurcation of main PA, extending\ninto both right and left main PAs. Significant RV dilation (RV/LV 1.4)\nwith bowing of IVS. No infarction identified.\n\nIMPRESSION: Saddle PE with right heart strain and impending\nhemodynamic compromise. Medical emergency — immediate thrombolysis\nor embolectomy indicated."

