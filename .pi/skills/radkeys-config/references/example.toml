  name = "Cervical Spine"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "MRI of the cervical spine without contrast.\n\nTECHNIQUE: Sagittal T1, T2, STIR and axial T2.\n\nFINDINGS: Normal cervical lordosis and alignment. Normal marrow signal.\nDiscs normal in height and signal. No herniation, bulge, or osteophyte.\nSpinal canal and foramina patent. Cord normal signal and caliber.\nNo syrinx. Craniocervical junction unremarkable.\n\nIMPRESSION: Normal MRI of the cervical spine."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Myelopathy"
    action = "text"
    content = "MRI of the cervical spine without contrast.\n\nLarge posterior disc-osteophyte complex at C5-C6 effacing ventral\nthecal sac and flattening cord. T2 hyperintensity in cord at this\nlevel consistent with myelomalacia. Moderate central canal stenosis\n(AP 7 mm). Mild disc bulges at C4-C5 and C6-C7 without cord\ncompression.\n\nIMPRESSION: C5-C6 disc-osteophyte complex with cord compression and\nmyelomalacia. Neurosurgical evaluation for ACDF."

