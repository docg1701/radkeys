[[screens]]
  id = "mri_spine_lumbar_disc"
  name = "Disc Disease"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Bulge L4-5"
    action = "text"
    content = "MRI of the lumbar spine without contrast.\n\nBroad-based disc bulge at L4-L5 effacing anterior thecal sac without\nsignificant canal stenosis. No herniation, extrusion, or nerve root\ncompression. Remaining discs normal.\n\nIMPRESSION: L4-L5 disc bulge without stenosis or nerve compression.\nConservative management."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Hernia L5-S1"
    action = "text"
    content = "MRI of the lumbar spine without contrast.\n\nLeft paracentral disc herniation at L5-S1 measuring ~6 mm AP. Contacts\nand slightly displaces traversing left S1 nerve root. Mild left\nforaminal narrowing. No canal stenosis.\n\nIMPRESSION: Left L5-S1 disc herniation with S1 nerve root contact.\nPain management or neurosurgical microdiscectomy."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Extrusion"
    action = "text"
    content = "MRI of the lumbar spine without contrast.\n\nLarge right paracentral disc extrusion at L4-L5 measuring 8 mm and\nmigrating inferiorly behind L5 body. Extruded fragment compresses\ntraversing right L5 nerve root within lateral recess. Moderate right\nforaminal stenosis.\n\nIMPRESSION: Large right L4-L5 disc extrusion with inferior migration\nand L5 nerve root compression. Urgent neurosurgical microdiscectomy."

