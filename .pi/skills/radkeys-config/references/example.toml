[[screens]]
  id = "xray_elbow"
  name = "Elbow X-Ray"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "AP and lateral views of the right elbow.\n\nNormal alignment and mineralization. No fracture or dislocation.\nJoint spaces preserved. Anterior fat pad sign negative; posterior\nfat pad absent. Soft tissues unremarkable.\n\nIMPRESSION: Normal right elbow radiographs."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Fat Pad+"
    action = "text"
    content = "AP and lateral views of the left elbow following trauma.\n\nPositive posterior fat pad sign and elevated anterior fat pad\n(\"sail sign\"), indicating joint effusion. No discrete fracture line.\n\nIMPRESSION: Joint effusion with positive fat pad signs. Occult radial\nhead or supracondylar fracture suspected. Follow-up in 10-14 days."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Rad Head"
    action = "text"
    content = "AP and lateral views of the right elbow.\n\nMinimally displaced transverse fracture through radial head involving\n~25% of articular surface with < 2 mm step-off (Mason type I). Moderate\njoint effusion with elevated fat pads. No other fractures.\n\nIMPRESSION: Mason type I radial head fracture. Conservative management\nwith early range of motion. Orthopedic follow-up."

