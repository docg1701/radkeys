[[screens]]
  id = "xray_abdomen"
  name = "Abdomen X-Ray"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Normal"
    action = "text"
    content = "Supine and upright abdominal radiographs.\n\nNormal bowel gas distribution. No obstruction, ileus, or free air.\nNo pathological calcifications or masses. Solid organs and bones\nare unremarkable.\n\nIMPRESSION: Normal abdominal series."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Ileus"
    action = "text"
    content = "Supine and upright abdominal radiographs.\n\nDiffuse gaseous distention of small and large bowel without transition\npoint, consistent with generalized adynamic ileus. No free air or\nmechanical obstruction.\n\nIMPRESSION: Generalized adynamic ileus. Correlate clinically."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "SBO"
    action = "text"
    content = "Supine and upright abdominal radiographs.\n\nMultiple dilated small bowel loops with air-fluid levels on upright\nview. Transition zone suggested in mid-abdomen. Paucity of colonic\ngas distally.\n\nIMPRESSION: Small bowel obstruction. CT abdomen/pelvis with IV\ncontrast recommended."

  [[screens.buttons]]
    row = 0
    col = 3
    label = "Free Air"
    action = "text"
    content = "Supine and upright abdominal radiographs.\n\nLinear lucency under the right hemidiaphragm on upright view,\nconsistent with free intraperitoneal air. No obstruction or ileus.\n\nIMPRESSION: Pneumoperitoneum. Immediate surgical evaluation required."

