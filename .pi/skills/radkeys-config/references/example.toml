[[screens]]
  id = "xray_hand_pediatric"
  name = "Pediatric Hand"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Salter II"
    action = "text"
    content = "PA and lateral views of the right wrist (10-year-old).\n\nFracture through distal radial physis extending into metaphysis,\nconsistent with Salter-Harris type II. Minimal dorsal displacement\n(< 3 mm). Epiphysis in normal position. Ulna intact.\n\nIMPRESSION: SH-II distal radius fracture, minimally displaced.\nClosed reduction and short-arm cast for 4-6 weeks."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Torus"
    action = "text"
    content = "PA and lateral views of the left wrist (7-year-old).\n\nSubtle buckling of dorsal cortex of distal radial metaphysis without\ncortical disruption, consistent with torus (buckle) fracture. No\nphyseal involvement. Ulna normal.\n\nIMPRESSION: Torus fracture of distal radius. Splint or cast for 3-4\nweeks. Excellent prognosis."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Greenstick"
    action = "text"
    content = "PA and lateral views of the right forearm (6-year-old).\n\nTransverse fracture through radial mid-diaphysis with dorsal cortical\ndisruption but intact volar cortex — greenstick fracture. ~15 degrees\ndorsal angulation. Ulna intact.\n\nIMPRESSION: Greenstick fracture of radius with moderate angulation.\nClosed reduction and long-arm cast for 6 weeks."

