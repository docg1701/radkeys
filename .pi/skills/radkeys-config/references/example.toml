[[screens]]
  id = "xray_hand_distal"
  name = "Distal Radius Fx"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Colles"
    action = "text"
    content = "PA and lateral views of the left wrist.\n\nTransverse fracture of distal radial metaphysis with dorsal angulation\nof ~20 degrees and dorsal comminution. Ulna intact. Radiocarpal and\nDRUJ congruent. Radial height decreased 3 mm.\n\nIMPRESSION: Colles fracture with dorsal angulation. Orthopedic\nevaluation for closed reduction and casting."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Smith"
    action = "text"
    content = "PA and lateral views of the right wrist.\n\nTransverse fracture of distal radial metaphysis with volar angulation\nof ~15 degrees. Ulna intact. Radiocarpal and DRUJ congruent.\n\nIMPRESSION: Smith fracture (reverse Colles) with volar angulation.\nThese are typically unstable — surgical fixation often required."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Barton"
    action = "text"
    content = "PA and lateral views of the left wrist.\n\nIntra-articular fracture of dorsal rim of distal radius with dorsal\ncarpal subluxation, consistent with dorsal Barton fracture. Fragment\ninvolves ~40% of articular surface with 2 mm step-off.\n\nIMPRESSION: Dorsal Barton fracture with carpal subluxation. Urgent\northopedic evaluation for ORIF."

  [[screens.buttons]]
    row = 0
    col = 3
    label = "Chauffeur"
    action = "text"
    content = "PA and lateral views of the right wrist.\n\nIntra-articular fracture through radial styloid process, consistent\nwith chauffeur (Hutchinson) fracture. Fracture extends obliquely to\nscaphoid facet. Minimal displacement (< 2 mm).\n\nIMPRESSION: Radial styloid fracture (chauffeur fracture), minimally\ndisplaced. Orthopedic follow-up for possible percutaneous pinning."

