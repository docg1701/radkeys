[[screens]]
  id = "ct_chest_interstitial"
  name = "ILD Patterns"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "UIP"
    action = "text"
    content = "HRCT of the chest.\n\nBilateral, basilar, subpleural predominant reticular opacity with\nhoneycombing and traction bronchiectasis, consistent with UIP pattern.\nNo GGO to suggest alternative diagnosis. Mild lower lobe volume loss.\n\nIMPRESSION: UIP pattern on HRCT. Correlate for IPF vs CTD-ILD.\nMultidisciplinary discussion recommended."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "NSIP"
    action = "text"
    content = "HRCT of the chest.\n\nBilateral, symmetric, lower-lobe predominant GGO with fine reticulation\nand traction bronchiectasis. Relative subpleural sparing favoring NSIP\npattern. No honeycombing.\n\nIMPRESSION: NSIP pattern on HRCT. Consider CTD-associated ILD. PFTs\nand rheumatology evaluation recommended."

