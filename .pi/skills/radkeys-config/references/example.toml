[[screens]]
  id = "ct_chest_aortic"
  name = "Aortic Syndrome"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Dissect. A"
    action = "text"
    content = "CT angiography of chest, abdomen, and pelvis.\n\nIntimal flap in ascending aorta originating just above aortic root\nand extending into descending thoracic aorta (Stanford type A). True\nlumen smaller than false lumen. Mild AR and small pericardial effusion.\nCoronary ostia patent. No abdominal extension.\n\nIMPRESSION: Stanford type A aortic dissection with pericardial\neffusion. Surgical emergency — immediate CT surgery consultation."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Dissect. B"
    action = "text"
    content = "CT angiography of chest, abdomen, and pelvis.\n\nIntimal flap in descending thoracic aorta beginning distal to left\nsubclavian artery and extending to renal arteries (Stanford type B).\nInvolves origin of SMA. No rupture or malperfusion.\n\nIMPRESSION: Stanford type B dissection involving SMA origin. Vascular\nsurgery for BP management and possible TEVAR."

