[[screens]]
  id = "xray_hand_phalanx"
  name = "Phalanx Fracture"

  [[screens.buttons]]
    row = 0
    col = 0
    label = "Tuft Fx"
    action = "text"
    content = "PA and lateral views of the left ring finger.\n\nComminuted fracture through distal phalangeal tuft. No intra-articular\nextension. Nail bed intact radiographically.\n\nIMPRESSION: Comminuted tuft fracture, left ring finger. Protective\nsplinting. Clinical evaluation for nail bed injury."

  [[screens.buttons]]
    row = 0
    col = 1
    label = "Mallet"
    action = "text"
    content = "Lateral view of the right index finger.\n\nSmall avulsion fracture at dorsal base of distal phalanx at extensor\ntendon insertion, with ~20 degrees DIP flexion (mallet deformity).\nNo volar subluxation.\n\nIMPRESSION: Mallet finger (bony avulsion). Continuous DIP extension\nsplinting for 6-8 weeks."

  [[screens.buttons]]
    row = 0
    col = 2
    label = "Jersey"
    action = "text"
    content = "Lateral view of the right ring finger.\n\nAvulsion fracture at volar base of middle phalanx at FDP insertion\nwith ~30 degrees PIP flexion. No proximal retraction of avulsed\nfragment.\n\nIMPRESSION: Jersey finger (FDP avulsion). Urgent hand surgery — delays\nbeyond 7-10 days significantly reduce success rates."

